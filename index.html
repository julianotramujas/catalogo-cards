<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Catálogo Cards Copa 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #ffffff;
      text-align: center;
      background: linear-gradient(135deg, #071712, #123f2e);
    }

    main {
      width: 100%;
      max-width: 700px;
      padding: 48px 24px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.25);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .trofeu {
      margin-bottom: 16px;
      font-size: 64px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(32px, 7vw, 54px);
    }

    p {
      margin: 8px 0;
      color: #d8e7df;
      font-size: 18px;
      line-height: 1.6;
    }

    .status {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 20px;
      border-radius: 999px;
      color: #10251c;
      font-weight: bold;
      background: #f4c542;
    }
  </style>
</head>

<body>
  <main>
    <div class="trofeu">🏆</div>

    <h1>Catálogo Cards Copa 2026</h1>

    <p>Cards Panini Adrenalyn XL da Copa do Mundo FIFA 2026.</p>
    <p>Pagamento via PIX e frete calculado separadamente.</p>

    <div class="status">Catálogo em construção</div>
  </main>
</body>
</html>
